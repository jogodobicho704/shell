<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#ffffff">
    <title>Sabor Brasileiro • Marmitas de Churrasco</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">

    <script src="https://cdn.utmify.com.br/scripts/utms/latest.js" data-utmify-prevent-xcod-sck data-utmify-prevent-subids async defer></script>
    
    <!-- Meta Pixel - Reordenado para fluxo correto -->
    <script>
    !function(f,b,e,v,n,t,s){if(f.fbq)return;n=f.fbq=function(){n.callMethod?n.callMethod.apply(n,arguments):n.queue.push(arguments)};if(!f._fbq)f._fbq=n;n.push=n;n.loaded=!0;n.version='2.0';n.queue=[];t=b.createElement(e);t.async=!0;t.src=v;s=b.getElementsByTagName(e)[0];s.parentNode.insertBefore(t,s)}(window, document,'script','https://connect.facebook.net/en_US/fbevents.js');fbq('init', '26526640770318634');
    </script>
    <noscript><img height="1" width="1" style="display:none" src="https://www.facebook.com/tr?id=26526640770318634&ev=PageView&noscript=1"/></noscript>

    <!-- Pixel UTMIFY -->
    <script>
      window.pixelId = "69e38ec2db04a358c41c2a71";
      var a = document.createElement("script");
      a.setAttribute("async", "");
      a.setAttribute("defer", "");
      a.setAttribute("src", "https://cdn.utmify.com.br/scripts/pixel/pixel.js");
      document.head.appendChild(a);
    </script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f8f8f8;
            color: #333;
        }

        .container {
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            position: relative;
        }

        /* ===== HEADER ===== */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px;
            border-bottom: 1px solid #f0f0f0;
            position: sticky;
            top: 0;
            background: white;
            z-index: 50;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-back {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: #333;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
        }

        /* ===== STEPS ===== */
        .steps-container {
            display: none;
            padding: 20px 16px;
            gap: 16px;
            flex-direction: column;
        }

        .steps-container.active {
            display: flex;
        }

        .step {
            display: none;
        }

        .step.active {
            display: block;
        }

        .step-header {
            margin-bottom: 20px;
        }

        .step-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .step-subtitle {
            font-size: 14px;
            color: #666;
        }

        /* ===== PRODUTOS ===== */
        .produtos-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .produto-card {
            padding: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            background: white;
        }

        .produto-card:hover {
            border-color: #dc5d2e;
            background: #fff8f5;
        }

        .produto-card.selected {
            border-color: #dc5d2e;
            background: #fef3ef;
        }

        .produto-label {
            font-size: 15px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .produto-preco {
            font-size: 18px;
            font-weight: 700;
            color: #dc5d2e;
        }

        /* ===== FORM ===== */
        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 12px;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: #dc5d2e;
        }

        /* ===== BOTÕES ===== */
        .btn {
            width: 100%;
            padding: 14px 16px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #dc5d2e;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #c94a1f;
        }

        .btn-primary:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .btn-secondary {
            background: white;
            color: #dc5d2e;
            border: 2px solid #dc5d2e;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #fef3ef;
        }

        /* ===== LOADING ===== */
        .loading {
            display: none;
            text-align: center;
            padding: 40px 20px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid #f0f0f0;
            border-top: 4px solid #dc5d2e;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .gap-16 {
            gap: 16px;
            display: flex;
            flex-direction: column;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="header-back" onclick="goBack()" style="display: none;" id="backBtn">←</button>
            <div class="header-title">Sabor Brasileiro</div>
            <div style="width: 24px;"></div>
        </div>

        <div class="steps-container active" id="stepsContainer">
            <!-- STEP 1: SELEÇÃO DE PRODUTO -->
            <div class="step active" id="step1">
                <div class="step-header">
                    <div class="step-title">Escolha seu Sabor</div>
                    <div class="step-subtitle">Selecione a marmita que deseja</div>
                </div>
                <div class="produtos-grid" id="produtosGrid"></div>
                <button class="btn btn-primary" onclick="goToStep(2)" id="btnStep1">Continuar</button>
            </div>

            <!-- STEP 2: FORMULÁRIO (LEAD) -->
            <div class="step" id="step2">
                <div class="step-header">
                    <div class="step-title">Seus Dados</div>
                    <div class="step-subtitle">Precisamos de seus dados para a entrega</div>
                </div>
                <form onsubmit="goToStep(3); return false;" class="gap-16">
                    <div class="form-group">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" class="form-input" id="inputName" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-input" id="inputEmail" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Telefone</label>
                        <input type="tel" class="form-input" id="inputPhone" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label">CPF</label>
                        <input type="text" class="form-input" id="inputCPF">
                    </div>
                    <button type="submit" class="btn btn-primary">Continuar para Pagamento</button>
                </form>
            </div>

            <!-- STEP 3: RESUMO + FINALIZAÇÃO -->
            <div class="step" id="step3">
                <div class="step-header">
                    <div class="step-title">Resumo do Pedido</div>
                    <div class="step-subtitle">Revise os dados antes de pagar</div>
                </div>
                <div style="background: #f8f8f8; padding: 16px; border-radius: 8px; margin-bottom: 16px;">
                    <div style="display: flex; justify-content: space-between; margin-bottom: 12px;">
                        <span id="resumoProduto">Marmita</span>
                        <span id="resumoValor">R$ 0,00</span>
                    </div>
                    <div style="display: flex; justify-content: space-between; font-weight: 700; font-size: 16px; border-top: 1px solid #e0e0e0; padding-top: 12px;">
                        <span>Total</span>
                        <span id="totalValor">R$ 0,00</span>
                    </div>
                </div>
                <button class="btn btn-primary" onclick="criarPIX()">Gerar PIX para Pagamento</button>
            </div>
        </div>

        <!-- LOADING -->
        <div class="loading" id="loadingDiv">
            <div class="spinner"></div>
            <p>Processando seu pedido...</p>
        </div>
    </div>

    <script>
        // ===== DADOS GLOBAIS =====
        let produtoSelecionado = null;
        let leadData = {};
        let pixData = {};

        // ===== PASSO 1: PIXEL PAGEVIEW =====
        document.addEventListener('DOMContentLoaded', () => {
            fbq('track', 'PageView');
            renderProdutos();
        });

        // ===== PRODUTOS =====
        const PRODUTOS = {
            pequena: { label: '1 Marmitex Pequena com Churrasco', preco: 1490 },
            grande: { label: '2 Marmitex Média com Churrasco', preco: 2890 },
            kit3: { label: '3 Kit Família Grande com Churrasco', preco: 3990 },
            milanesa: { label: '1 Marmitex Média com Bife Milanesa Frango', preco: 1690 },
            strog: { label: '2 Marmitex Média Strogonof', preco: 2590 },
            costela: { label: '2 Marmitex Grande Costela Assada', preco: 2990 },
            parmegiana: { label: '2 Marmitex Grande Parmegiana Frango', preco: 2590 }
        };

        function renderProdutos() {
            const grid = document.getElementById('produtosGrid');
            grid.innerHTML = '';
            
            Object.entries(PRODUTOS).forEach(([key, produto]) => {
                const card = document.createElement('div');
                card.className = 'produto-card';
                card.innerHTML = `
                    <div class="produto-label">${produto.label}</div>
                    <div class="produto-preco">R$ ${(produto.preco / 100).toFixed(2)}</div>
                `;
                
                card.onclick = () => {
                    // Remover seleção anterior
                    document.querySelectorAll('.produto-card').forEach(c => c.classList.remove('selected'));
                    // Adicionar seleção
                    card.classList.add('selected');
                    produtoSelecionado = { key, ...produto };
                    
                    // PASSO 2: PIXEL VIEWCONTENT
                    fbq('track', 'ViewContent', {
                        content_name: produto.label,
                        content_type: 'product',
                        value: produto.preco / 100,
                        currency: 'BRL'
                    });
                };
                
                grid.appendChild(card);
            });
        }

        function goToStep(stepNumber) {
            if (stepNumber === 2 && !produtoSelecionado) {
                alert('Selecione um produto!');
                return;
            }

            if (stepNumber === 3) {
                // Coletar dados do formulário
                leadData = {
                    name: document.getElementById('inputName').value,
                    email: document.getElementById('inputEmail').value,
                    phone: document.getElementById('inputPhone').value,
                    document: document.getElementById('inputCPF').value
                };

                if (!leadData.name || !leadData.email || !leadData.phone) {
                    alert('Preencha todos os campos obrigatórios!');
                    return;
                }

                // PASSO 3: PIXEL ADDTOCART
                fbq('track', 'AddToCart', {
                    content_name: produtoSelecionado.label,
                    content_type: 'product',
                    value: produtoSelecionado.preco / 100,
                    currency: 'BRL',
                    content_ids: [produtoSelecionado.key]
                });

                // PASSO 4: PIXEL LEAD
                fbq('track', 'Lead', {
                    content_name: produtoSelecionado.label,
                    currency: 'BRL',
                    value: produtoSelecionado.preco / 100
                });

                // Atualizar resumo
                document.getElementById('resumoProduto').textContent = produtoSelecionado.label;
                const valor = (produtoSelecionado.preco / 100).toFixed(2);
                document.getElementById('resumoValor').textContent = `R$ ${valor}`;
                document.getElementById('totalValor').textContent = `R$ ${valor}`;
            }

            // Esconder todos os steps
            document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
            // Mostrar step solicitado
            document.getElementById(`step${stepNumber}`).classList.add('active');
            
            // Mostrar/esconder botão voltar
            document.getElementById('backBtn').style.display = stepNumber === 1 ? 'none' : 'block';
        }

        function goBack() {
            const currentStep = Array.from(document.querySelectorAll('.step')).findIndex(s => s.classList.contains('active')) + 1;
            if (currentStep > 1) {
                goToStep(currentStep - 1);
            }
        }

        async function criarPIX() {
            if (!produtoSelecionado || !leadData.name) {
                alert('Dados incompletos!');
                return;
            }

            // PASSO 5: PIXEL INITIATECHECKOUT
            fbq('track', 'InitiateCheckout', {
                content_name: produtoSelecionado.label,
                content_type: 'product',
                value: produtoSelecionado.preco / 100,
                currency: 'BRL',
                content_ids: [produtoSelecionado.key]
            });

            // Mostrar loading
            document.getElementById('loadingDiv').classList.add('active');
            document.getElementById('stepsContainer').style.display = 'none';

            try {
                // Obter UTMs do UTMIFY
                const params = new URLSearchParams();
                
                // Adicionar parâmetros do produto e lead
                params.append('product', produtoSelecionado.key);
                params.append('name', leadData.name);
                params.append('email', leadData.email);
                params.append('phone', leadData.phone);
                params.append('document', leadData.document);

                // Adicionar UTMs (UTMIFY popula esses valores)
                const utm_source = new URLSearchParams(window.location.search).get('utm_source') || '';
                const utm_medium = new URLSearchParams(window.location.search).get('utm_medium') || '';
                const utm_campaign = new URLSearchParams(window.location.search).get('utm_campaign') || '';
                const utm_content = new URLSearchParams(window.location.search).get('utm_content') || '';
                const utm_term = new URLSearchParams(window.location.search).get('utm_term') || '';
                const fbclid = new URLSearchParams(window.location.search).get('fbclid') || '';
                const xcod = new URLSearchParams(window.location.search).get('xcod') || '';
                const sck = new URLSearchParams(window.location.search).get('sck') || '';

                if (utm_source) params.append('utm_source', utm_source);
                if (utm_medium) params.append('utm_medium', utm_medium);
                if (utm_campaign) params.append('utm_campaign', utm_campaign);
                if (utm_content) params.append('utm_content', utm_content);
                if (utm_term) params.append('utm_term', utm_term);
                if (fbclid) params.append('fbclid', fbclid);
                if (xcod) params.append('xcod', xcod);
                if (sck) params.append('sck', sck);

                // Chamar Worker Cloudflare
                const response = await fetch(`/create-payment?${params.toString()}`, {
                    method: 'GET'
                });

                const result = await response.json();

                if (result.statusCode !== 200 || !result.data) {
                    throw new Error(result.error || 'Erro ao criar PIX');
                }

                // Salvar dados completos do PIX
                pixData = result.data;

                // PASSO 6: PIXEL ADDPAYMENTINFO
                fbq('track', 'AddPaymentInfo', {
                    content_name: produtoSelecionado.label,
                    content_type: 'product',
                    value: pixData.amount / 100,
                    currency: 'BRL',
                    payment_method: 'pix'
                });

                // Redirecionar para página de PIX com UTMs preservadas
                const pixPageParams = new URLSearchParams();
                pixPageParams.append('transaction_id', pixData.transaction_id);
                pixPageParams.append('pix_code', pixData.pix_copia_e_cola);
                pixPageParams.append('pix_base64', pixData.pix_base64);
                pixPageParams.append('amount', pixData.amount);
                pixPageParams.append('label', pixData.label);
                pixPageParams.append('name', leadData.name);
                
                // Adicionar UTMs na URL de redirecionamento
                if (utm_source) pixPageParams.append('utm_source', utm_source);
                if (utm_medium) pixPageParams.append('utm_medium', utm_medium);
                if (utm_campaign) pixPageParams.append('utm_campaign', utm_campaign);
                if (utm_content) pixPageParams.append('utm_content', utm_content);
                if (utm_term) pixPageParams.append('utm_term', utm_term);
                if (fbclid) pixPageParams.append('fbclid', fbclid);
                if (xcod) pixPageParams.append('xcod', xcod);
                if (sck) pixPageParams.append('sck', sck);

                window.location.href = `pix.html?${pixPageParams.toString()}`;

            } catch (error) {
                document.getElementById('loadingDiv').classList.remove('active');
                document.getElementById('stepsContainer').style.display = 'flex';
                alert('Erro: ' + error.message);
            }
        }
    </script>
</body>
</html>
